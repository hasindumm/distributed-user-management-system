version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgresadaptor
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  nats:
    image: nats:latest
    container_name: nats
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/users?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure

  gateway:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      PORT: "8080"
      CACHE_ENABLED: "true"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_started
      user-service:
        condition: service_started
    restart: on-failure
