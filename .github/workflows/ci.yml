name: CI Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.54.2

      - name: Run lint (gateway-service)
        working-directory: ./gateway-service
        run: golangci-lint run ./...

      - name: Run lint (user-service)
        working-directory: ./user-service
        run: golangci-lint run ./...

      - name: Run tests (gateway-service)
        working-directory: ./gateway-service
        run: go test ./...

      - name: Run tests (user-service)
        working-directory: ./user-service
        run: go test ./...